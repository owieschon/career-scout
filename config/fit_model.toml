# ─── PREP — evidence-retrieval baseline (Phase 0: de-hardcoded from ───────────
# scripts/prep_pipeline._target_tags_for_role). The user's always-available
# "lead competency" tags, surfaced for EVERY role as baseline credibility. A
# builder -> ["builder","applied-ai"]; a pure-salesperson user would set []
# (no builder injection). A LIGHT signal (kept to 2 tags) so it never crowds the
# archetype's own evidence. NOT an engine default — user data.
[prep]
baseline_retrieval_tags = ["builder", "applied-ai"]


# ─── FIT DIMENSIONS — structured label vocab (docs/FIT_STRATEGY_SPINE.md) ─────
# The deterministic dimensional layer (scripts/fit_dimensions.py) wraps the
# UNCHANGED judge. Generic patterns (role_archetype, seniority, company_archetype)
# live in code; the operator-specific bits live here. Domain on/off reuses
# [sourcing].domain_kw / domain_neg.
[fit_dimensions]
# adjacent = function fits but domain is off-thesis -> REACH, never hard-cut.
adjacent_domain_patterns = 'data ?infra(?:structure)?|observability|data warehouse|analytics platform|developer tool|devtool|api platform|database'
# off-thesis domains that ALSO screen on domain -> NOT-FIT (no story + they filter).
off_thesis_screened_patterns = 'fintech|payments|banking|\binsurance\b|hr[- ]?tech|crypto|web3|ad[- ]?tech|martech|cybersecurity|clearance|\bitar\b'
# Cadence Analytics competitors -> hard NOT-FIT (blocker: competitor).
competitors = 'gong|clari|people\.ai|setsail|outreach\.io|salesloft|groove|aviso|insightsquared|troops|madkudu'
# nonrole signals -> NOT-FIT (not a live opening).
nonrole_patterns = 'talent pool|talent network|general application|evergreen|always hiring|expression of interest'
